default: true
line-length: false
no-inline-html:
  allowed_elements:
    - codapi-snippet
    - kbd
    - DocCardList
    - details
    - summary
    - br
    - iframe
    - sup
emphasis-style:
  style: underscore
ul-style:
  style: consistent
table-pipe-style:
  style: leading_and_trailing
no-duplicate-heading:
  siblings_only: true
